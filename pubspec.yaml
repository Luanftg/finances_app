name: finances_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_command: ^7.2.2
  shared_preferences: ^2.5.3
  flutter_launcher_icons: ^0.14.4
  awesome_icons: ^1.1.0
  dio: ^5.9.0
  google_sign_in: ^7.1.1
  envied: ^1.2.1
  path_provider: ^2.1.5
  logger_package:
    path: '../../logger_package'
  google_fonts: ^6.3.2
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  envied_generator: ^1.2.1
  build_runner: ^2.7.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/image.png"

  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/app_icon_launcher.png
    - assets/image.png